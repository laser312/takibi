<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Takibi</title>
<link href="https://fonts.googleapis.com/css2?family=Sofia&family=Noto+Sans+JP:wght@200;300;500&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #0a0d18;
    --bg-mid:  #14110d;
    --amber:   #ffb060;
    --amber-soft: #c8772e;
    --menu-glass: rgba(8, 12, 24, 0.58);
    --menu-line-warm: rgba(255,170,95,0.20);
    --menu-line-cool: rgba(92,124,210,0.24);
    --menu-text: #eadfce;
    --menu-btn-warm: rgba(255,156,72,0.20);
    --menu-btn-warm-hover: rgba(255,170,92,0.34);
    --menu-btn-cool: rgba(34,62,128,0.30);
    --menu-btn-cool-hover: rgba(56,94,188,0.46);
    --friend-add-gap-to-self-id: 16px; /* 追加ボタンと自分IDの間隔 */
    --friend-back-width: 128px;        /* 戻るボタン横幅 */
    --friend-back-height: 48px;        /* 戻るボタン高さ */
    --friend-back-bottom: 20px;        /* 画面下から戻るボタンまで */
    --friend-back-text-nudge-x: 0px;   /* 戻る文字X微調整(右:+ 左:-) */
    --friend-back-text-nudge-y: 0px;   /* 戻る文字Y微調整(下:+ 上:-) */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%;height:100%;
    background:radial-gradient(ellipse at 50% 65%, #1a1410 0%, var(--bg-deep) 55%, #05070d 100%);
    overflow:hidden;
    font-family:'Noto Sans JP',sans-serif;
    color:var(--amber);
    -webkit-font-smoothing:antialiased;
  }
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
  }
  #frame{
    position:relative;
    width:100vw;height:100vh;
    max-width:430px;max-height:100vh;
    overflow:hidden;
  }
  @media(min-width:500px){
    #frame{
      max-height:900px;
      border-radius:38px;
      box-shadow:0 0 80px rgba(255,140,60,0.06),0 0 0 1px rgba(255,180,100,0.05);
    }
  }
  canvas{display:block;width:100% !important;height:100% !important;}
  .title-wrap{
    position:absolute;left:5%;right:0;top:18%;
    text-align:center;pointer-events:none;
    opacity:0;transform:translateY(8px);
    animation:fadeUp 3.6s ease 0.5s forwards;
    transition:opacity 0.6s ease;
  }
  .title-wrap.hide{
    opacity:0 !important;
    transform:translateY(10px);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  .title{
    font-family:'Sofia',cursive;
    font-size:46px;font-weight:400;letter-spacing:0.5em;
    color:#ffd9a8;
    text-shadow:0 0 18px rgba(255,150,60,0.35),0 0 42px rgba(255,120,40,0.18);
  }
  .tap-enter{
    position:absolute;left:0;right:0;bottom:5%;
    text-align:center;font-family:'Sofia',cursive;
    font-size:20px;letter-spacing:0.32em;
    color:rgba(255,190,130,0.6);pointer-events:none;
    opacity:0;
    animation:fadeIn 3s ease 1.5s forwards, slowPulse 5.2s ease-in-out 6s infinite;
    transition:opacity 0.4s ease;
  }
  .tap-enter.hide{
    opacity:0 !important;
    transition:opacity 0.7s ease;
  }
  @keyframes fadeUp   {to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn   {to{opacity:1;}}
  @keyframes slowPulse{0%,100%{opacity:0.18;}50%{opacity:0.75;}}
  /* ワールド背景の明るいレイヤー: body背景の前面に重ね、opacity遷移で切り替える */
  #worldBg{
    position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(ellipse at 50% 65%, #2a1e10 0%, #14161f 55%, #0a0c14 100%);
    opacity:0;
    transition:opacity 2.6s ease;
  }
  #vignette{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at 50% 60%,
      rgba(0,0,0,0) 40%,rgba(0,0,0,0.55) 90%,rgba(0,0,0,0.85) 100%);
    mix-blend-mode:multiply;
  }
  #menuBtn{
    position:absolute;top:16px;left:14px;z-index:40;
    width:42px;height:42px;border-radius:10px;
    border:none;
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.35s ease;
  }
  #menuBtn.menu-ready{
    pointer-events:auto;
  }
  #menuBtn::before{
    content:"";
    position:absolute;inset:0;
    border-radius:10px;
    border:2px solid rgba(255,180,110,0.30);
    background:rgba(13,22,58,0.78);
    backdrop-filter:blur(4px);
    opacity:0;
    transition:opacity 0.25s ease;
    pointer-events:none;
  }
  #menuBtn .line{
    position:absolute;width:20px;height:2px;border-radius:2px;
    background:rgba(239, 223, 200, 0.92);
    transition:transform 0.52s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.52s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  #menuBtn .line:nth-child(1){transform:translateY(-6px);}
  #menuBtn .line:nth-child(2){transform:translateY(0);}
  #menuBtn .line:nth-child(3){transform:translateY(6px);}
  #menuBtn.open .line:nth-child(1){transform:rotate(45deg);}
  #menuBtn.open .line:nth-child(2){opacity:0;}
  #menuBtn.open .line:nth-child(3){transform:rotate(-45deg);}
  #menuBtn.open::before{opacity:1;}
  #menuBackdrop{
    position:absolute;inset:0;z-index:35;display:none;
    background:rgba(3,5,10,0.26);
  }
  #menuBackdrop.open{display:block;}
  #nameLayer{
    position:absolute;inset:0;z-index:22;
    pointer-events:none;
  }
  .name-tag{
    position:absolute;
    transform:translate(-50%, -50%);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.02em;
    color:var(--menu-text);
    text-shadow:0 2px 10px rgba(0,0,0,0.48);
    white-space:nowrap;
    opacity:0;
  }
  #sideMenu{
    position:absolute;left:0;top:0;bottom:0;z-index:36;
    width:86%;
    min-width:260px;
    max-width:388px;
    padding:82px 16px 16px;
    background:
      linear-gradient(155deg, rgba(14,23,56,0.24) 0%, rgba(255,147,68,0.06) 100%),
      var(--menu-glass);
    border-right:2px solid var(--menu-line-warm);
    box-shadow:0 12px 36px rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    transform:translateX(-105%);
    transition:transform 0.62s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  #sideMenu.open{transform:translateX(0);}
  .menu-item{
    width:100%;
    display:flex;align-items:center;justify-content:center;
    border:2px solid rgba(255,255,255,0.08);border-radius:10px;
    background:rgba(8,12,24,0.36);
    color:var(--menu-text);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:18px;font-weight:700;
    padding:12px 12px;
    margin-bottom:10px;
    text-align:center;
    cursor:pointer;
    letter-spacing:0.02em;
    transition:background-color 0.32s ease, color 0.32s ease, border-color 0.32s ease, box-shadow 0.32s ease;
  }
  .menu-item.register{
    background:var(--menu-btn-cool);
    border-color:rgba(255,180,110,0.30);
  }
  .menu-item.remove{
    background:var(--menu-btn-cool);
    border-color:rgba(255,180,110,0.30);
  }
  .menu-item.register:hover{
    background:var(--menu-btn-cool-hover);
    color:#e9f0ff;
    border-color:rgba(255,194,138,0.52);
    box-shadow:0 0 0 1px rgba(255,170,95,0.22) inset;
  }
  .menu-item.remove:hover{
    background:var(--menu-btn-cool-hover);
    color:#e9f0ff;
    border-color:rgba(255,194,138,0.52);
    box-shadow:0 0 0 1px rgba(255,170,95,0.22) inset;
  }
  .menu-item.list{
    background:var(--menu-btn-cool);
    border-color:rgba(255,180,110,0.30);
  }
  .menu-item.list:hover{
    background:var(--menu-btn-cool-hover);
    color:#e9f0ff;
    border-color:rgba(255,194,138,0.52);
    box-shadow:0 0 0 1px rgba(255,170,95,0.22) inset;
  }
  #friendUiLayer{
    position:absolute;inset:0;z-index:38;
    pointer-events:none;
  }
  #friendUiLayer.open{
    pointer-events:auto;
  }
  .friend-panel{
    position:absolute;left:0;top:0;bottom:0;
    width:86%;
    min-width:260px;
    max-width:388px;
    padding:82px 16px 16px;
    background:
      linear-gradient(150deg, rgba(12,22,56,0.34) 0%, rgba(255,145,70,0.08) 100%),
      rgba(7,11,24,0.78);
    border-right:2px solid rgba(255,176,108,0.30);
    box-shadow:0 14px 42px rgba(0,0,0,0.55);
    backdrop-filter:blur(10px);
    transform:translateX(-108%);
    opacity:0;
    transition:transform 0.62s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.48s ease;
    pointer-events:none;
    text-align:center;
  }
  .friend-panel.open{
    transform:translateX(0);
    opacity:1;
    pointer-events:auto;
  }
  .friend-panel-head{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:10px;
  }
  .friend-panel-title{
    color:var(--menu-text);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.02em;
  }
  .friend-back-btn{
    border:2px solid rgba(255,185,126,0.34);
    border-radius:12px;
    background:linear-gradient(165deg, rgba(31,58,122,0.62) 0%, rgba(78,46,29,0.54) 100%);
    color:var(--menu-text);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.02em;
    width:var(--friend-back-width);
    height:var(--friend-back-height);
    padding:0;
    cursor:pointer;
    display:grid;
    place-items:center;
    text-align:center;
    line-height:1;
    appearance:none;
    -webkit-appearance:none;
    writing-mode:horizontal-tb;
    text-indent:0;
    transition:filter 0.3s ease, transform 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
    margin-top:14px;
  }
  .friend-back-btn .label{
    display:block;
    transform:translate(var(--friend-back-text-nudge-x), var(--friend-back-text-nudge-y));
  }
  .friend-back-btn:hover{
    filter:brightness(1.08);
    border-color:rgba(255,203,146,0.52);
  }
  .friend-back-btn:active{
    transform:translateY(1px);
  }
  .friend-caption{
    color:rgba(233,223,205,0.92);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:15px;
    margin-bottom:10px;
    text-align:center;
  }
  .friend-id-row{
    display:flex;align-items:center;justify-content:center;
    margin-bottom:12px;
  }
  .friend-id-input-wrap{
    position:relative;
    width:100%;
  }
  #friendIdInput{
    width:100%;
    border:1px solid rgba(255,188,128,0.28);
    border-radius:12px;
    background:rgba(8,12,22,0.56);
    color:#f2e5d3;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:18px;
    letter-spacing:0.08em;
    padding:12px 12px;
    outline:none;
    transition:border-color 0.25s ease, box-shadow 0.25s ease;
    text-align:center;
  }
  #friendIdInput::placeholder{
    text-align:center;
  }
  #friendIdInput:focus{
    border-color:rgba(255,190,132,0.58);
    box-shadow:0 0 0 1px rgba(255,160,90,0.28) inset;
  }
  #friendFoundName{
    display:block;
    min-height:24px;
    color:#eadfce;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:17px;
    font-weight:700;
    text-align:center;
    opacity:0;
    margin-top:8px;
    margin-bottom: 12px;
    transform:translateY(4px);
    transition:opacity 0.46s ease, transform 0.46s ease;
    pointer-events:none;
  }
  #friendFoundName.show{
    opacity:1;
    transform:translateY(0);
  }
  .friend-action-btn{
    width:100%;
    border:2px solid rgba(255,185,126,0.34);
    border-radius:12px;
    background:linear-gradient(165deg, rgba(31,58,122,0.62) 0%, rgba(78,46,29,0.54) 100%);
    color:var(--menu-text);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:19px;
    font-weight:700;
    letter-spacing:0.02em;
    padding:12px 12px;
    cursor:pointer;
    transition:filter 0.3s ease, transform 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
    margin-bottom:var(--friend-add-gap-to-self-id);
  }
  .friend-action-btn:hover{
    filter:brightness(1.08);
    border-color:rgba(255,203,146,0.52);
  }
  .friend-action-btn:active{
    transform:translateY(1px);
  }
  .friend-action-btn:disabled{
    opacity:0.45;
    cursor:not-allowed;
    filter:saturate(0.65);
  }
  .friend-self-id{
    color:rgba(227,215,197,0.80);
    font-family:'Noto Sans JP',sans-serif;
    font-size:14px;
    letter-spacing:0.03em;
    text-align:center;
  }
  .friend-list-wrap{
    border:1px solid rgba(255,190,132,0.26);
    border-radius:12px;
    background:rgba(5,10,22,0.44);
    padding:10px;
  }
  .friend-remove-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .friend-remove-item{
    width:100%;
    text-align:left;
    color:#f0e4d1;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:500;
    padding:10px 12px;
    border-radius:9px;
    border:1px solid rgba(255,188,128,0.18);
    background:linear-gradient(160deg, rgba(41,66,128,0.28) 0%, rgba(94,55,35,0.24) 100%);
    cursor:pointer;
    transition:filter 0.25s ease, border-color 0.25s ease;
  }
  .friend-remove-item:hover{
    filter:brightness(1.06);
    border-color:rgba(255,204,151,0.52);
  }
  .friend-list-head{
    color:rgba(233,223,205,0.9);
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:700;
    margin-top: 16px;
    margin-bottom:8px;
    text-align:center;
  }
  #friendWaitingList{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .friend-wait-item{
    color:#f0e4d1;
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px;
    font-weight:500;
    padding:8px 10px;
    border-radius:9px;
    border:1px solid rgba(255,188,128,0.18);
    background:linear-gradient(160deg, rgba(41,66,128,0.28) 0%, rgba(94,55,35,0.24) 100%);
  }
  .friend-list-empty{
    color:rgba(227,216,200,0.62);
    font-family:'Noto Sans JP',sans-serif;
    font-size:13px;
    margin-top:8px;
    text-align:center;
  }
  #friendConfirm{
    position:absolute;inset:0;z-index:39;
    display:flex;align-items:center;justify-content:center;
    background:rgba(3,6,14,0.38);
    opacity:0;pointer-events:none;
    transition:opacity 0.34s ease;
  }
  #friendConfirm.open{
    opacity:1;
    pointer-events:auto;
  }
  .friend-confirm-card{
    width:min(86%, 320px);
    border:1px solid rgba(255,186,126,0.36);
    border-radius:14px;
    padding:18px 14px 14px;
    background:
      linear-gradient(150deg, rgba(22,40,95,0.68) 0%, rgba(87,50,29,0.58) 100%),
      rgba(8,12,24,0.92);
    box-shadow:0 12px 30px rgba(0,0,0,0.52);
    backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
  }
  #friendConfirmText{
    color:#f2e5d2;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:20px;
    font-weight:700;
    text-align:center;
    margin-bottom:14px;
    min-height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:1;
    transform:translateY(0);
    transition:opacity 0.28s ease, transform 0.28s ease;
  }
  #friendConfirmText.is-fading-out{
    opacity:0;
    transform:translateY(-3px);
  }
  #friendConfirmText.is-fading-in{
    animation:friendConfirmTextFadeIn 0.32s ease;
  }
  .friend-confirm-actions{
    display:flex;gap:10px;
  }
  .friend-confirm-btn{
    flex:1;
    border:1px solid rgba(255,191,134,0.38);
    border-radius:10px;
    background:rgba(16,28,66,0.56);
    color:#f0e4d2;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:16px;
    font-weight:700;
    min-height:44px;
    padding:0;
    cursor:pointer;
    display:grid;
    place-items:center;
    text-align:center;
    line-height:1;
    appearance:none;
    -webkit-appearance:none;
    text-indent:0;
    writing-mode:horizontal-tb;
    transition:background-color 0.28s ease, border-color 0.28s ease;
  }
  .friend-confirm-btn:hover{
    background:rgba(48,77,156,0.62);
    border-color:rgba(255,210,154,0.54);
  }
  .friend-confirm-card.message-mode{
    min-height:120px;
    justify-content:center;
  }
  .friend-confirm-card.message-mode #friendConfirmText{
    margin-bottom:0;
  }
  @keyframes friendConfirmTextFadeIn{
    0%{
      opacity:0;
      transform:translateY(3px);
    }
    100%{
      opacity:1;
      transform:translateY(0);
    }
  }
  #friendToast{
    position:absolute;
    left:50%;
    bottom:18%;
    transform:translate(-50%, 10px);
    z-index:39;
    border:1px solid rgba(255,189,130,0.34);
    border-radius:12px;
    background:linear-gradient(165deg, rgba(20,37,86,0.86) 0%, rgba(90,53,31,0.78) 100%);
    color:#f2e7d6;
    font-family:'Shippori Mincho','Noto Sans JP',sans-serif;
    font-size:17px;
    font-weight:700;
    padding:12px 16px;
    box-shadow:0 10px 26px rgba(0,0,0,0.44);
    opacity:0;
    pointer-events:none;
    text-align:center;
  }
  #friendToast.show{
    animation:friendToastInOut 1.9s ease forwards;
  }
  #friendAddBackBtn{
    position:absolute;
    left:50%;
    bottom:var(--friend-back-bottom);
    transform:translateX(-50%);
  }
  #friendListBackBtn{
    position:absolute;
    left:50%;
    bottom:var(--friend-back-bottom);
    transform:translateX(-50%);
  }
  #friendRemoveBackBtn{
    position:absolute;
    left:50%;
    bottom:var(--friend-back-bottom);
    transform:translateX(-50%);
  }
  #friendAddBackBtn:active{
    transform:translateX(-50%) translateY(1px);
  }
  #friendListBackBtn:active{
    transform:translateX(-50%) translateY(1px);
  }
  #friendRemoveBackBtn:active{
    transform:translateX(-50%) translateY(1px);
  }
  @keyframes friendToastInOut{
    0%{opacity:0;transform:translate(-50%, 10px);}
    18%{opacity:1;transform:translate(-50%, 0);}
    72%{opacity:1;transform:translate(-50%, 0);}
    100%{opacity:0;transform:translate(-50%, -6px);}
  }
</style>
</head>
<body>
<div id="worldBg"></div>
<div id="stage">
  <div id="frame">
    <button id="menuBtn" aria-label="メニューを開く" type="button">
      <span class="line"></span>
      <span class="line"></span>
      <span class="line"></span>
    </button>
    <div id="menuBackdrop"></div>
    <div id="nameLayer"></div>
    <aside id="sideMenu" aria-hidden="true">
      <button class="menu-item register" type="button">
        <span>友達を登録する</span>
      </button>
      <button class="menu-item remove" type="button">
        <span>友達を解除する</span>
      </button>
      <button class="menu-item list" type="button">
        <span>友達リスト</span>
      </button>
    </aside>
    <div id="friendUiLayer" aria-hidden="true">
      <section id="friendAddPanel" class="friend-panel" aria-hidden="true">
        <div class="friend-panel-head">
          <h3 class="friend-panel-title">友達を登録する</h3>
        </div>
        <div class="friend-id-row">
          <div class="friend-id-input-wrap">
            <input id="friendIdInput" type="text" inputmode="numeric" maxlength="6" placeholder="友達のIDを入力する" />
          </div>
        </div>
        <span id="friendFoundName">Aki</span>
        <button id="friendAddActionBtn" class="friend-action-btn" type="button" disabled>友達を追加する</button>
        <p class="friend-self-id">自分のID: 736482</p>

/* ---------- 薪マテリアル ---------- */
function distortLogGeometry(geo, amount, seed){
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const ang = Math.atan2(z, x);
    const radial = Math.sqrt(x*x + z*z);
    const n1 = Math.sin(ang * 5.0 + y * 8.0 + seed * 1.7);
    const n2 = Math.sin(ang * 9.0 - y * 5.0 + seed * 3.2);
    const warp = 1.0 + (n1 * 0.65 + n2 * 0.35) * amount * 0.35;
    const taper = 1.0 - Math.min(1.0, Math.abs(y) / (geo.parameters.height * 0.5)) * amount * 0.15;
    const r = radial * warp * taper;
    const nx = Math.cos(ang) * r;
    const nz = Math.sin(ang) * r;
    pos.setXYZ(i, nx, y, nz);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
}

function createLogMaterial(dark){
  const silMix = THREE.MathUtils.clamp(CONFIG.logSilhouetteMix, 0, 1);
  const lightRgb = CONFIG.logColorLight ?? [0.36, 0.17, 0.07];
  const darkRgb = CONFIG.logColorDark ?? [0.20, 0.09, 0.04];
  const baseColor = new THREE.Color(
    ...(dark ? darkRgb : lightRgb)
  );
  const silhouetteColor = new THREE.Color(0x070606);
  const color = baseColor.clone().lerp(silhouetteColor, silMix);
  return new THREE.MeshBasicMaterial({
    color,
    toneMapped: false,
    transparent: false,
    opacity: 1.0,
    depthWrite: true,
    depthTest: true,
  });
}

  const radialSegments = Math.max(3, Math.floor(CONFIG.logRadialSegments));
  const logGeo = new THREE.CylinderGeometry(def.rad * CONFIG.logTaper, def.rad, def.len, radialSegments, 1);
  const logSeed = 1307 + idx * 97;
  distortLogGeometry(logGeo, CONFIG.fireStyle.logWarpAmount, logSeed * 0.013);
  const logMat = createLogMaterial(def.dark);
  const mesh = new THREE.Mesh(
    logGeo,
    logMat
  );
  mesh.castShadow = true;
  mesh.receiveShadow = false;
  logMats.push(logMat);
  logBaseColors.push(logMat.color.clone());
  mesh.renderOrder = 2;
  mesh.rotation.set(def.rotX, def.rotY, def.rotZ);
  mesh.position.set(def.x, def.y, def.z);
  logsGroup.add(mesh);
});

  uniforms:{uTime:{value:0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`
    varying vec2 vUv;uniform float uTime;
    void main(){
      vec2 p=vUv-vec2(0.5,0.42);
      float d=length(p*vec2(1.4,1.0));
      float f=0.92+0.08*sin(uTime*6.0)+0.05*sin(uTime*13.0);
      float c=smoothstep(0.55,0.0,d)*f;
      gl_FragColor=vec4(mix(vec3(0.35,0.10,0.02),vec3(1.0,0.55,0.18),c),c*0.85);

/* ---------- VolumetricFire方式 + 火の粉 ---------- */
const VOLUME_CORNER_NEIGHBORS = [
  [1, 2, 4], [0, 5, 3], [0, 3, 6], [1, 7, 2],
  [0, 6, 5], [1, 4, 7], [2, 7, 4], [3, 5, 6],
];
const VOLUME_INCOMING_EDGES = [
  [-1,  2,  4, -1,  1, -1, -1, -1],
  [ 5, -1, -1,  0, -1,  3, -1, -1],
  [ 3, -1, -1,  6, -1, -1,  0, -1],
  [-1,  7,  1, -1, -1, -1, -1,  2],
  [ 6, -1, -1, -1, -1,  0,  5, -1],
  [-1,  4, -1, -1,  7, -1, -1,  1],
  [-1, -1,  7, -1,  2, -1, -1,  4],
  [-1, -1, -1,  5, -1,  6,  3, -1],
];

class FirePriorityQueue {
  constructor(){
    this.contents = [];
    this.sorted = false;
  }
  sort(){
    this.contents.sort((a, b) => a.priority - b.priority);
    this.sorted = true;
  }
  push(object, priority){
    this.contents.push({object, priority});
    this.sorted = false;
  }
  pop(){
    if(!this.sorted) this.sort();
    return this.contents.pop();
  }
  top(){
    if(!this.sorted) this.sort();
    return this.contents[this.contents.length - 1];
  }
}

function createVolumetricFireMaterial(){
  const textureLoader = new THREE.TextureLoader();
  const nzw = textureLoader.load(`${CONFIG.fireStyle.flameTexturePath}nzw.png`);
  nzw.wrapS = THREE.RepeatWrapping;
  nzw.wrapT = THREE.RepeatWrapping;
  nzw.magFilter = THREE.LinearFilter;
  nzw.minFilter = THREE.LinearFilter;

  const fireProfile = textureLoader.load(`${CONFIG.fireStyle.flameTexturePath}firetex.png`);
  fireProfile.wrapS = THREE.ClampToEdgeWrapping;
  fireProfile.wrapT = THREE.ClampToEdgeWrapping;
  fireProfile.magFilter = THREE.LinearFilter;
  fireProfile.minFilter = THREE.LinearFilter;

  return new THREE.RawShaderMaterial({
    transparent: true,
    depthWrite: false,
    depthTest: true,
    side: THREE.DoubleSide,
    blending: THREE.NormalBlending,
    uniforms: {
      nzw:         {value: nzw},
      fireProfile: {value: fireProfile},
      time:        {value: 0},
      uIntensity:  {value: CONFIG.fireStyle.flameVolumeOpacity * CONFIG.fireStyle.flameIntensity},
      uAlpha:      {value: CONFIG.fireStyle.flameAlpha},
      uAlphaResponse:{value: CONFIG.fireStyle.flameAlphaResponse},
      uBrightness: {value: CONFIG.fireStyle.flameBrightness},
      uAnimSpeed:  {value: CONFIG.fireStyle.flameAnimationSpeed},
      uNoiseScale: {value: CONFIG.fireStyle.flame3DNoiseScale},
      uNoiseSpeed: {value: CONFIG.fireStyle.flame3DNoiseSpeed},
      uDistort:    {value: CONFIG.fireStyle.flame3DTurbulence * 1.3},
      uDensity:    {value: CONFIG.fireStyle.flameVolumeDensity},
      uSoftness:   {value: CONFIG.fireStyle.flameSoftness},
      uCoreBoost:  {value: CONFIG.fireStyle.flameCoreBoost},
    },
    vertexShader: `
      precision highp float;
      attribute vec3 position;
      attribute vec3 tex;
      uniform mat4 projectionMatrix;
      uniform mat4 modelViewMatrix;
      varying vec3 texOut;
      void main(void){
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        texOut = tex;
      }`,
    fragmentShader: `
      precision highp float;
      uniform sampler2D nzw;
      uniform sampler2D fireProfile;
      uniform float time;
      uniform float uIntensity;
      uniform float uAlpha;
      uniform float uAlphaResponse;
      uniform float uBrightness;
      uniform float uAnimSpeed;
      uniform float uNoiseScale;
      uniform float uNoiseSpeed;
      uniform float uDistort;
      uniform float uDensity;
      uniform float uSoftness;
      uniform float uCoreBoost;
      varying vec3 texOut;
      const float modulus = 61.0;
      const float lacunarity = 2.0;
      const float gain = 0.5;

      vec2 mBBS(vec2 val, float m){
        val = mod(val, m);
        return mod(val * val, m);
      }
      float mnoise(vec3 pos){
        float intArg = floor(pos.z);
        float fracArg = fract(pos.z);
        vec2 hash = mBBS(intArg * 3.0 + vec2(0.0, 3.0), modulus);
        vec4 g = vec4(
          texture2D(nzw, vec2(pos.x, pos.y + hash.x) / modulus).xy,
          texture2D(nzw, vec2(pos.x, pos.y + hash.y) / modulus).xy
        ) * 2.0 - 1.0;
        return mix(
          g.x + g.y * fracArg,
          g.z + g.w * (fracArg - 1.0),
          smoothstep(0.0, 1.0, fracArg)
        );
      }
      float turbulence(vec3 pos){
        float sum = 0.0;
        float freq = 1.0;
        float amp = 1.0;
        for(int i=0;i<4;i++){
          sum += abs(mnoise(pos * freq)) * amp;
          freq *= lacunarity;
          amp *= gain;
        }
        return sum;
      }
      vec4 sampleFire(vec3 loc, vec4 scale){
        loc.xz = loc.xz * 2.0 - 1.0;
        vec2 st = vec2(sqrt(dot(loc.xz, loc.xz)), loc.y);
        loc.y -= time * scale.w;
        loc *= scale.xyz;
        float offset = sqrt(max(0.0, st.y)) * uDistort * turbulence(loc);
        st.y += offset;
        if(st.y > 1.0 || st.x > 1.0){
          return vec4(0.0);
        }
        vec4 result = texture2D(fireProfile, st);
        if(st.y < 0.1){
          result *= st.y / 0.1;
        }
        return result;
      }
      void main(void){
        vec4 fire = sampleFire(texOut, vec4(uNoiseScale, uNoiseScale * 2.0, uNoiseScale, uNoiseSpeed * uAnimSpeed));
        float alpha = clamp((fire.r + fire.g + fire.b) * 0.70 * uDensity, 0.0, 1.0);
        alpha = pow(alpha, max(0.35, uSoftness));
        alpha = clamp(alpha * uIntensity * uAlpha, 0.0, 1.0);
        alpha = 1.0 - pow(1.0 - alpha, max(0.01, uAlphaResponse));
        vec3 col = fire.rgb * (1.18 + uCoreBoost * 0.32) * uBrightness;
        gl_FragColor = vec4(col, alpha);
      }`,
  });
}

class CameraSlicedFire {
  constructor(width, height, depth, sliceSpacing, camera){
    this.camera = camera;
    this._sliceSpacing = Math.max(0.01, sliceSpacing);
    this._viewVector = new THREE.Vector3();
    this._sliceOffset = 0.0;
    this._posCorners = [];
    this._texCorners = [];

    const hw = width * 0.5;
    const hh = height * 0.5;
    const hd = depth * 0.5;
    this._posCorners.push(
      new THREE.Vector3(-hw, -hh, -hd), new THREE.Vector3(hw, -hh, -hd),
      new THREE.Vector3(-hw,  hh, -hd), new THREE.Vector3(hw,  hh, -hd),
      new THREE.Vector3(-hw, -hh,  hd), new THREE.Vector3(hw, -hh,  hd),
      new THREE.Vector3(-hw,  hh,  hd), new THREE.Vector3(hw,  hh,  hd),
    );
    this._texCorners.push(
      new THREE.Vector3(0,0,0), new THREE.Vector3(1,0,0),
      new THREE.Vector3(0,1,0), new THREE.Vector3(1,1,0),
      new THREE.Vector3(0,0,1), new THREE.Vector3(1,0,1),
      new THREE.Vector3(0,1,1), new THREE.Vector3(1,1,1),
    );

    const estimatedSlices = Math.ceil((width + height + depth) / this._sliceSpacing) + 24;
    this._maxVertices = Math.min(65000, estimatedSlices * 12);
    this._maxIndices = estimatedSlices * 30;

    const index = new Uint16Array(this._maxIndices);
    const position = new Float32Array(this._maxVertices * 3);
    const tex = new Float32Array(this._maxVertices * 3);

    this.geometry = new THREE.BufferGeometry();
    this.geometry.setIndex(new THREE.BufferAttribute(index, 1));
    this.geometry.setAttribute('position', new THREE.BufferAttribute(position, 3).setUsage(THREE.DynamicDrawUsage));
    this.geometry.setAttribute('tex', new THREE.BufferAttribute(tex, 3).setUsage(THREE.DynamicDrawUsage));
    this.geometry.setDrawRange(0, 0);

    this.material = createVolumetricFireMaterial();
    this.mesh = new THREE.Mesh(this.geometry, this.material);
    this.mesh.frustumCulled = false;
  }

  update(elapsed){
    this.mesh.material.uniforms.time.value = elapsed;
    this.mesh.material.uniforms.uIntensity.value = CONFIG.fireStyle.flameVolumeOpacity * CONFIG.fireStyle.flameIntensity;
    this.mesh.material.uniforms.uAlpha.value = CONFIG.fireStyle.flameAlpha;
    this.mesh.material.uniforms.uAlphaResponse.value = CONFIG.fireStyle.flameAlphaResponse;
    this.mesh.material.uniforms.uBrightness.value = CONFIG.fireStyle.flameBrightness;
    this.mesh.material.uniforms.uAnimSpeed.value = CONFIG.fireStyle.flameAnimationSpeed;
    this.mesh.material.uniforms.uNoiseScale.value = CONFIG.fireStyle.flame3DNoiseScale;
    this.mesh.material.uniforms.uNoiseSpeed.value = CONFIG.fireStyle.flame3DNoiseSpeed;
    this.mesh.material.uniforms.uDistort.value = CONFIG.fireStyle.flame3DTurbulence * 1.3;
    this.mesh.material.uniforms.uDensity.value = CONFIG.fireStyle.flameVolumeDensity;
    this.mesh.material.uniforms.uSoftness.value = CONFIG.fireStyle.flameSoftness;
    this.mesh.material.uniforms.uCoreBoost.value = CONFIG.fireStyle.flameCoreBoost;
    this._sliceOffset = ((elapsed * CONFIG.fireStyle.flameSliceDrift) % 1.0) * this._sliceSpacing;
    this.updateViewVector();
    this.slice();
    this.updateGeometry();
  }

  updateViewVector(){
    const modelViewMatrix = new THREE.Matrix4().multiplyMatrices(
      this.camera.matrixWorldInverse,
      this.mesh.matrixWorld
    );
    this._viewVector.set(
      -modelViewMatrix.elements[2],
      -modelViewMatrix.elements[6],
      -modelViewMatrix.elements[10]
    ).normalize();
  }

  updateGeometry(){
    if(this._indexes.length > this._maxIndices) return;
    if((this._points.length / 3) > this._maxVertices) return;

    this.geometry.index.array.set(this._indexes, 0);
    this.geometry.attributes.position.array.set(this._points, 0);
    this.geometry.attributes.tex.array.set(this._texCoords, 0);
    this.geometry.setDrawRange(0, this._indexes.length);
    this.geometry.index.needsUpdate = true;
    this.geometry.attributes.position.needsUpdate = true;
    this.geometry.attributes.tex.needsUpdate = true;
  }

  slice(){
    this._points = [];
    this._texCoords = [];
    this._indexes = [];

    let i;
    const cornerDistance = [];
    let cornerDistance0 = this._posCorners[0].dot(this._viewVector);
    cornerDistance[0] = cornerDistance0;
    let maxCorner = 0;
    let minDistance = cornerDistance0;
    let maxDistance = cornerDistance0;

    for(i=1;i<8;i++){
      cornerDistance[i] = this._posCorners[i].dot(this._viewVector);
      if(cornerDistance[i] > maxDistance){
        maxCorner = i;
        maxDistance = cornerDistance[i];
      }
      if(cornerDistance[i] < minDistance){
        minDistance = cornerDistance[i];
      }
    }

    let sliceDistance = Math.floor((maxDistance - this._sliceOffset) / this._sliceSpacing) * this._sliceSpacing + this._sliceOffset;
    const activeEdges = [];
    let firstEdge = 0;
    let nextEdge = 0;
    const expirations = new FirePriorityQueue();

    const createEdge = (startIndex, endIndex) => {
      if(nextEdge >= 12) return undefined;
      const activeEdge = {
        expired: false,
        startIndex,
        endIndex,
        deltaPos: new THREE.Vector3(),
        deltaTex: new THREE.Vector3(),
        pos: new THREE.Vector3(),
        tex: new THREE.Vector3(),
      };
      const range = cornerDistance[startIndex] - cornerDistance[endIndex];
      if(range !== 0){
        const invRange = 1.0 / range;
        activeEdge.deltaPos.subVectors(this._posCorners[endIndex], this._posCorners[startIndex]).multiplyScalar(invRange);
        activeEdge.deltaTex.subVectors(this._texCorners[endIndex], this._texCorners[startIndex]).multiplyScalar(invRange);
        const step = cornerDistance[startIndex] - sliceDistance;
        activeEdge.pos.addVectors(activeEdge.deltaPos.clone().multiplyScalar(step), this._posCorners[startIndex]);
        activeEdge.tex.addVectors(activeEdge.deltaTex.clone().multiplyScalar(step), this._texCorners[startIndex]);
        activeEdge.deltaPos.multiplyScalar(this._sliceSpacing);
        activeEdge.deltaTex.multiplyScalar(this._sliceSpacing);
      }
      expirations.push(activeEdge, cornerDistance[endIndex]);
      activeEdges[nextEdge] = activeEdge;
      nextEdge++;
      return activeEdge;
    };

    for(i=0;i<3;i++){
      const edge = createEdge(maxCorner, VOLUME_CORNER_NEIGHBORS[maxCorner][i]);
      if(!edge) continue;
      edge.prev = (i + 2) % 3;
      edge.next = (i + 1) % 3;
    }

    let nextIndex = 0;
    while(sliceDistance > minDistance){
      while(expirations.contents.length && expirations.top().priority >= sliceDistance){
        const edge = expirations.pop().object;
        if(edge.expired) continue;
        if(
          edge.endIndex !== activeEdges[edge.prev].endIndex &&
          edge.endIndex !== activeEdges[edge.next].endIndex
        ){
          edge.expired = true;
          const edge1 = createEdge(edge.endIndex, VOLUME_INCOMING_EDGES[edge.endIndex][edge.startIndex]);
          if(!edge1) break;
          edge1.prev = edge.prev;
          activeEdges[edge.prev].next = nextEdge - 1;
          edge1.next = nextEdge;

          const edge2 = createEdge(edge.endIndex, VOLUME_INCOMING_EDGES[edge.endIndex][edge1.endIndex]);
          if(!edge2) break;
          edge2.prev = nextEdge - 2;
          edge2.next = edge.next;
          activeEdges[edge2.next].prev = nextEdge - 1;
          firstEdge = nextEdge - 1;
        } else {
          let prev;
          let next;
          if(edge.endIndex === activeEdges[edge.prev].endIndex){
            prev = activeEdges[edge.prev];
            next = edge;
          } else {
            prev = edge;
            next = activeEdges[edge.next];
          }
          prev.expired = true;
          next.expired = true;
          const merged = createEdge(edge.endIndex, VOLUME_INCOMING_EDGES[edge.endIndex][prev.startIndex]);
          if(!merged) break;
          merged.prev = prev.prev;
          activeEdges[merged.prev].next = nextEdge - 1;
          merged.next = next.next;
          activeEdges[merged.next].prev = nextEdge - 1;
          firstEdge = nextEdge - 1;
        }
      }

      let cur = firstEdge;
      let count = 0;
      do {
        count++;
        const edge = activeEdges[cur];
        this._points.push(edge.pos.x, edge.pos.y, edge.pos.z);
        this._texCoords.push(edge.tex.x, edge.tex.y, edge.tex.z);
        edge.pos.add(edge.deltaPos);
        edge.tex.add(edge.deltaTex);
        cur = edge.next;
      } while(cur !== firstEdge);

      for(i=2;i<count;i++){
        this._indexes.push(nextIndex, nextIndex + i - 1, nextIndex + i);
      }
      nextIndex += count;
      sliceDistance -= this._sliceSpacing;
    }
  }
}

  fragmentShader:`
    uniform float uOpacity;

      col=mix(col,uColorTop,clamp((heat-0.35)*1.7,0.0,1.0));
      float outAlpha=alpha*fadeIn*fadeOut*uOpacity;
      if(outAlpha<0.01)discard;
      gl_FragColor=vec4(col,outAlpha);
    }`,
});

/* ============================================================
   人型オブジェクト
   ─────────────────────────────────────────────────────────
   四角錐 (ConeGeometry, radialSegments=4) + 球で構成。
   各三角面の頂角 α から底面の外接円半径 R を以下で算出:

     各三角面 = 二等辺三角形 (頂点〜隣接底面頂点の2辺が等辺)
     余弦定理より:  cos α = H² / (R² + H²)
     整理して:      R = H · √((1 - cos α) / cos α)

   頭部球の中心 Y (グループローカル座標):
     headLocalY = H/2 + headRadius × (1 - headOverlapFactor)
     headOverlapFactor = 0 → 球が頂点に接する
     headOverlapFactor = 1 → 球の中心が頂点に一致 (最大重なり)
   ============================================================ */

/* マテリアルを配列で管理 (フェードイン時に一括 opacity 更新) */
const figBaseMats = [];   // ベース: emissive 付き MeshStandard
const figHaloMats = [];   // ハロー: AdditiveBlending MeshBasic

/*
 * createFigure(glowColor)
 *   glowColor : 発光色 (0xffffff 等)
 *
 * 発光の仕組み:
 *   ① baseMat の emissive で、オブジェクト自体が指定色に光って見える
 *   ② haloMat のハローメッシュ (ひと回り大きい、AdditiveBlending) で
 *      輪郭外にぼんやりと光をにじませる
 */
function createFigure(glowColor){
  const H = CONFIG.figures.bodyHeight;
  const headR = CONFIG.figures.headRadius;
  const figRoughness = THREE.MathUtils.clamp(CONFIG.figures.bodyRoughness ?? 0.985, 0, 1);
  const figMetalness = THREE.MathUtils.clamp(CONFIG.figures.bodyMetalness ?? 0.0, 0, 1);
  const eyeSizeRatio = THREE.MathUtils.clamp(CONFIG.figures.eyeSize ?? 0.115, 0.04, 0.30);
  const eyeColorRgb = CONFIG.figures.eyeColor ?? [0.10, 0.08, 0.08];
  const eyeColor = new THREE.Color(
    THREE.MathUtils.clamp(eyeColorRgb[0] ?? 0.1, 0, 1),
    THREE.MathUtils.clamp(eyeColorRgb[1] ?? 0.08, 0, 1),
    THREE.MathUtils.clamp(eyeColorRgb[2] ?? 0.08, 0, 1)
  );
  const angleNorm = THREE.MathUtils.clamp(CONFIG.figures.pyramidApexAngle / 60, 0.55, 1.25);
  const torsoTop = H * (0.24 + 0.12 * angleNorm);
  const torsoBottom = torsoTop * 0.78;
  const torsoH = H * 0.62;
  const legH = H * 0.20;
  const shoulderY = -H * 0.02;
  const headLocalY = shoulderY + torsoH * 0.56 + headR * (1.05 - CONFIG.figures.headOverlapFactor * 0.55);

  const baseMat = new THREE.MeshStandardMaterial({
    color:             0xffffff,
    emissive:          new THREE.Color(glowColor),
    emissiveIntensity: CONFIG.figures.emissiveIntensity * 0.10,
    roughness:         figRoughness,
    metalness:         figMetalness,
    transparent:       true,
    opacity:           0.0,
  });
  figBaseMats.push(baseMat);

  const accentMat = new THREE.MeshStandardMaterial({
    color:             0xffffff,
    emissive:          new THREE.Color(0x000000),
    emissiveIntensity: 0.0,
    roughness:         THREE.MathUtils.clamp(figRoughness + 0.01, 0, 1),
    metalness:         figMetalness,
    transparent:       true,
    opacity:           0.0,
  });
  figBaseMats.push(accentMat);

  const limbMat = new THREE.MeshStandardMaterial({
    color:             0xffffff,
    emissive:          new THREE.Color(0x000000),
    emissiveIntensity: 0.0,
    roughness:         THREE.MathUtils.clamp(figRoughness + 0.005, 0, 1),
    metalness:         figMetalness,
    transparent:       true,
    opacity:           0.0,
  });
  figBaseMats.push(limbMat);

  const eyeMat = new THREE.MeshBasicMaterial({
    color:       eyeColor,
    transparent: true,
    opacity:     0.0,
    depthWrite:  false,
  });
  figBaseMats.push(eyeMat);

  const haloMat = new THREE.MeshBasicMaterial({
    color:       new THREE.Color(glowColor),
    transparent: true,
    opacity:     0.0,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
  });
  figHaloMats.push(haloMat);

  const group = new THREE.Group();

  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(torsoTop * 0.58, torsoH * 0.54, 8, 16), baseMat);
  torso.position.y = shoulderY;
  torso.scale.set(1.0, 0.92, 0.82);
  group.add(torso);

  const legGeo = new THREE.CylinderGeometry(torsoBottom * 0.18, torsoBottom * 0.20, legH, 8);
  const legL = new THREE.Mesh(legGeo, limbMat);
  const legR = new THREE.Mesh(legGeo, limbMat);
  legL.position.set(-torsoBottom * 0.22, shoulderY - torsoH * 0.42, 0.0);
  legR.position.set( torsoBottom * 0.22, shoulderY - torsoH * 0.42, 0.0);
  group.add(legL, legR);

  const armGeo = new THREE.SphereGeometry(headR * 0.28, 10, 8);
  const armL = new THREE.Mesh(armGeo, baseMat);
  const armR = new THREE.Mesh(armGeo, baseMat);
  armL.position.set(-torsoTop * 0.82, shoulderY + torsoH * 0.12, torsoTop * 0.05);
  armR.position.set( torsoTop * 0.82, shoulderY + torsoH * 0.12, torsoTop * 0.05);
  group.add(armL, armR);

  const headRig = new THREE.Group();
  headRig.position.y = headLocalY;
  group.add(headRig);

  const head = new THREE.Mesh(new THREE.SphereGeometry(headR, 16, 12), baseMat);
  head.position.y = 0;
  head.scale.set(1.0, 0.92, 1.0);
  headRig.add(head);

  const eyeGeo = new THREE.SphereGeometry(headR * eyeSizeRatio, 10, 8);
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-headR * 0.33, headR * 0.03, headR * 0.82);
  eyeR.position.set( headR * 0.33, headR * 0.03, headR * 0.82);
  headRig.add(eyeL, eyeR);

  const headHalo = new THREE.Mesh(new THREE.SphereGeometry(headR * 1.08, 12, 10), haloMat);
  headHalo.position.y = 0;
  headHalo.scale.setScalar(CONFIG.figures.haloScale);
  headRig.add(headHalo);

  // ローカル座標での実メッシュ最低Yを保持して、厳密接地に使う
  let minY = Infinity;
  group.traverse(obj => {
    if(!obj.isMesh) return;
    if(!obj.geometry.boundingBox) obj.geometry.computeBoundingBox();
    const bb = obj.geometry.boundingBox;
    if(!bb) return;
    const y0 = bb.min.y * obj.scale.y + obj.position.y;
    if(y0 < minY) minY = y0;
  });
  group.userData.localMinY = Number.isFinite(minY) ? minY : -H * 0.5;
  group.userData.headRig = headRig;
  group.userData.pulseBaseMat = baseMat;
  group.userData.pulseHaloMat = haloMat;
  group.userData.pulseColor = new THREE.Color(1, 1, 1);
  group.userData.pulseStartTime = -1;
  group.traverse(obj => {
    if(!obj.isMesh) return;
    obj.castShadow = true;
    obj.receiveShadow = false;
  });

  return group;
}

const figures = CONFIG.figures.positions.map(([fx, fz], i) => {
  const color = CONFIG.figures.glowColors[i] ?? 0xffffff;
  const fig = createFigure(color);
  const figGroundBaseY = CONFIG.figures.groundedToTerrain
    ? getGroundYBase() + CONFIG.figures.groundOffsetY
    : CONFIG.figures.groundY;
  fig.position.set(fx, figGroundBaseY - (fig.userData.localMinY ?? -CONFIG.figures.bodyHeight/2), fz);
  fig.lookAt(0, fig.position.y + 0.12, 0);
  scene.add(fig);
  return fig;
});

function configColorToThree(value){
  if(Array.isArray(value)){
    return new THREE.Color(
      THREE.MathUtils.clamp(value[0] ?? 1.0, 0, 1),
      THREE.MathUtils.clamp(value[1] ?? 1.0, 0, 1),
      THREE.MathUtils.clamp(value[2] ?? 1.0, 0, 1)
    );
  }
  if(typeof value === 'number') return new THREE.Color(value);
  return new THREE.Color(1, 1, 1);
}

function shuffleArrayInPlace(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function assignPulseColorsToFigures(){
  const palette = (CONFIG.figures.pulseColorPalette ?? []).map(configColorToThree);
  if(palette.length === 0){
    figures.forEach(fig => { fig.userData.pulseColor = new THREE.Color(1, 1, 1); });
    return;
  }
  shuffleArrayInPlace(palette);
  figures.forEach((fig, i) => {
    fig.userData.pulseColor = palette[i % palette.length].clone();
  });
}

function primePulseAudio(){
  if(figurePulseAudioPrimed) return;
  figurePulseAudioPrimed = true;
  figurePulseAudioPlayers.forEach(audio => {
    audio.muted = true;
    const p = audio.play();
    if(p && typeof p.then === 'function'){
      p.then(() => {
        audio.pause();
        audio.currentTime = 0;
        audio.muted = false;
      }).catch(() => {
        audio.muted = false;
      });
    } else {
      audio.muted = false;
    }
  });
}

function playRandomPulseAudio(){
  if(figurePulseAudioPlayers.length === 0) return;
  const pick = figurePulseAudioPlayers[Math.floor(Math.random() * figurePulseAudioPlayers.length)];
  pick.volume = THREE.MathUtils.clamp(CONFIG.figures.pulseAudioVolume ?? 0.42, 0, 1);
  try{
    pick.currentTime = 0;
  }catch(_e){}
  const p = pick.play();
  if(p && typeof p.catch === 'function') p.catch(() => {});
}

function scheduleNextFigurePulse(figureIndex){
  if(!figurePulseLoopStarted) return;
  if(figureIndex < 0 || figureIndex >= figures.length) return;
  const minSec = Math.max(0.15, CONFIG.figures.pulseIntervalMinSec ?? 5.0);
  const maxSec = Math.max(minSec, CONFIG.figures.pulseIntervalMaxSec ?? 11.0);
  const delayMs = (minSec + Math.random() * (maxSec - minSec)) * 1000;
  figurePulseTimerIds[figureIndex] = window.setTimeout(() => {
    const fig = figures[figureIndex];
    if(fig){
      fig.userData.pulseStartTime = (performance.now() - _t0) / 1000;
      playRandomPulseAudio();
    }
    scheduleNextFigurePulse(figureIndex);
  }, delayMs);
}

function startFigurePulseLoop(){
  if(figurePulseLoopStarted) return;
  figurePulseLoopStarted = true;
  for(let i=0;i<figurePulseTimerIds.length;i++){
    if(figurePulseTimerIds[i] !== undefined){
      clearTimeout(figurePulseTimerIds[i]);
    }
    figurePulseTimerIds[i] = undefined;
  }
  for(let i=0;i<figures.length;i++){
    scheduleNextFigurePulse(i);
  }
}

function startTakibiLoopAudio(){
  if(takibiLoopStarted) return;
  takibiLoopStarted = true;
  const p = takibiLoopAudio.play();
  if(p && typeof p.catch === 'function'){
    p.catch(() => {
      takibiLoopStarted = false;
    });
  }
}

function registerEnvMat(mat, targetOpacity){
  mat.transparent = true;
  mat.opacity = 0.0;
  envFadeEntries.push({mat, targetOpacity});
}

function createSeededRandom(seed){
  let t = seed >>> 0;
  return () => {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function ridgeNoise01(x, seed){
  const n1 = Math.sin((x * 3.1 + seed * 1.37) * Math.PI * 2.0) * 0.5 + 0.5;
  const n2 = Math.sin((x * 7.8 + seed * 2.73) * Math.PI * 2.0 + 1.2) * 0.5 + 0.5;
  const n3 = Math.sin((x * 14.6 + seed * 5.11) * Math.PI * 2.0 + 0.7) * 0.5 + 0.5;
  return THREE.MathUtils.clamp(n1 * 0.56 + n2 * 0.31 + n3 * 0.13, 0, 1);
}

function cloudNoise3(x,y,z,seed){
  const a = Math.sin((x*2.3 + y*1.7 + z*2.9 + seed*0.73) * Math.PI * 2.0);
  const b = Math.sin((x*5.1 - y*3.9 + z*4.2 + seed*1.31) * Math.PI * 2.0 + 0.7);
  const c = Math.sin((x*9.2 + y*7.4 - z*6.8 + seed*2.11) * Math.PI * 2.0 + 1.2);
  return (a * 0.55 + b * 0.30 + c * 0.15);
}

function toColorFromRgbArray(rgb){
  return new THREE.Color(
    THREE.MathUtils.clamp(rgb?.[0] ?? 0.0, 0, 1),
    THREE.MathUtils.clamp(rgb?.[1] ?? 0.0, 0, 1),
    THREE.MathUtils.clamp(rgb?.[2] ?? 0.0, 0, 1)
  );
}

function createVerticalGradientTexture(bottomColor, topColor){
  const cvs = document.createElement('canvas');
  cvs.width = 4;
  cvs.height = 256;
  const ctx = cvs.getContext('2d');
  const grad = ctx.createLinearGradient(0, cvs.height, 0, 0);
  grad.addColorStop(0, `#${bottomColor.getHexString()}`);
  grad.addColorStop(1, `#${topColor.getHexString()}`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  const tex = new THREE.CanvasTexture(cvs);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function createFluffyCloudGeometry(realism, fluffiness){
  const ws = Math.round(THREE.MathUtils.lerp(10, 22, realism));
  const hs = Math.round(THREE.MathUtils.lerp(8, 16, realism));
  const geo = new THREE.SphereGeometry(1.0, ws, hs);
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const vx = pos.getX(i), vy = pos.getY(i), vz = pos.getZ(i);
    const len = Math.max(0.0001, Math.sqrt(vx*vx + vy*vy + vz*vz));
    const nx = vx/len, ny = vy/len, nz = vz/len;
    const n = cloudNoise3(nx, ny, nz, 0.37 + realism * 2.0);
    const wobble = 1.0 + n * THREE.MathUtils.lerp(0.08, 0.22, fluffiness) * THREE.MathUtils.lerp(0.55, 1.0, realism);
    pos.setXYZ(i, nx * wobble, ny * wobble, nz * wobble);
  }
  geo.computeVertexNormals();
  return geo;
}

function createEnvironment(){
  const [fireX,,fireZ] = CONFIG.transition.fireFinalPos;
  const env = CONFIG.environment;
  const rng = createSeededRandom(20260416);
  const gravelBaseY = computeGravelBaseY();

  // 空グラデーション (RGB設定)
  const skyBottom = toColorFromRgbArray(env.skyColorBottom);
  const skyTop = toColorFromRgbArray(env.skyColorTop);
  const skyTexture = createVerticalGradientTexture(skyBottom, skyTop);
  const skyMat = new THREE.MeshBasicMaterial({
    map: skyTexture,
    side: THREE.BackSide,
    depthWrite: false,
    depthTest: false,
  });
  registerEnvMat(skyMat, 1.0);
  const skyDome = new THREE.Mesh(new THREE.SphereGeometry(52, 24, 18), skyMat);
  skyDome.position.set(fireX, -2.0, -8.0);
  skyDome.renderOrder = -100;
  environmentGroup.add(skyDome);

  // 月の光源 + 月の見た目
  const [moonX, moonY] = env.moonPosition;
  const farEnvZ = Math.min(env.mountainDepthStart, env.cloudDepthFar);
  const moonZ = farEnvZ - env.moonBackOffset;
  const moonColor = new THREE.Color(...env.moonColor);
  const moonFill = new THREE.DirectionalLight(moonColor, env.moonLightIntensity);
  moonFill.position.set(moonX, moonY, moonZ);
  environmentGroup.add(moonFill);
  const moonAmbient = new THREE.HemisphereLight(moonColor, 0x1a140f, env.moonAmbientBoost);
  environmentGroup.add(moonAmbient);

  const moonDiscMat = new THREE.MeshBasicMaterial({color:moonColor, depthWrite:false});
  registerEnvMat(moonDiscMat, env.moonDiscOpacity);
  const moonDisc = new THREE.Mesh(new THREE.SphereGeometry(1.0, 20, 16), moonDiscMat);
  moonDisc.position.set(moonX, moonY, moonZ);
  moonDisc.scale.setScalar(env.moonDiscSize);
  moonDisc.renderOrder = -10;
  environmentGroup.add(moonDisc);

  // 星
  if(env.enableStars){
    const starCount = Math.max(0, Math.floor(env.starCount));
    const starGeo = new THREE.SphereGeometry(1.0, 8, 8);
    const starMat = new THREE.MeshBasicMaterial({
      color: 0xeff3ff,
      depthWrite: false,
      depthTest: true,
    });
    registerEnvMat(starMat, env.starOpacity);
    const stars = new THREE.InstancedMesh(starGeo, starMat, starCount);
    stars.renderOrder = -30;
    const _m = new THREE.Matrix4();
    const _p = new THREE.Vector3();
    const _q = new THREE.Quaternion();
    const _s = new THREE.Vector3();
    const halfW = env.mountainWidth * 0.65;
    for(let i=0;i<starCount;i++){
      _p.set(
        fireX + (rng() - 0.5) * halfW * 2.0,
        THREE.MathUtils.lerp(env.starYMin, env.starYMax, rng()),
        THREE.MathUtils.lerp(env.starDepthNear, env.starDepthFar, rng())
      );
      const sc = THREE.MathUtils.lerp(env.starSizeMin, env.starSizeMax, Math.pow(rng(), 1.3));
      _s.set(sc, sc, sc);
      _m.compose(_p, _q, _s);
      stars.setMatrixAt(i, _m);
    }
    stars.instanceMatrix.needsUpdate = true;
    environmentGroup.add(stars);
  }

  // 山: 多層のリッジ形状を遠景に重ねる
  const mountainFarColor  = new THREE.Color(0x06080d);
  const mountainNearColor = new THREE.Color(0x1a1f28);
  const mountainLayerDenom = Math.max(1, env.mountainLayers - 1);
  for(let layer=0; layer<env.mountainLayers; layer++){
    const tLayer = layer / mountainLayerDenom;
    const width  = env.mountainWidth * (1.0 + tLayer * 0.45);
    const halfW  = width * 0.5;
    const baseY  = env.mountainBaseY - tLayer * 0.22;
    const height = THREE.MathUtils.lerp(env.mountainHeightMin, env.mountainHeightMax, tLayer);
    const seg    = 180;
    const shape  = new THREE.Shape();
    shape.moveTo(-halfW, baseY - 0.20);
    for(let i=0;i<=seg;i++){
      const nx = i / seg;
      const x = -halfW + nx * width;
      const ridgeA = ridgeNoise01(nx, 0.31 + layer * 0.29);
      const ridgeB = ridgeNoise01(nx * 1.7, 1.17 + layer * 0.41);
      const shoulders = Math.pow(Math.sin(nx * Math.PI), 0.62);
      const y = baseY + height * (0.18 + (ridgeA * 0.75 + ridgeB * 0.25) * shoulders);
      shape.lineTo(x, y);
    }
    shape.lineTo(halfW, baseY - 0.20);
    shape.lineTo(-halfW, baseY - 0.20);

    const mountainGeo = new THREE.ExtrudeGeometry(shape, {depth: 0.45 + tLayer * 0.20, bevelEnabled: false, steps: 1});
    const mountainMat = new THREE.MeshStandardMaterial({
      color: mountainFarColor.clone().lerp(mountainNearColor, tLayer),
      roughness: 1.0,
      metalness: 0.0,
    });
    registerEnvMat(mountainMat, THREE.MathUtils.lerp(env.mountainOpacityFar, env.mountainOpacityNear, tLayer));

    const mountain = new THREE.Mesh(mountainGeo, mountainMat);
    const yDown = rng() * env.mountainVerticalSpread * (0.45 + 0.55 * tLayer);
    mountain.position.set(
      THREE.MathUtils.lerp(-1.2, 1.2, rng()),
      -yDown, // 下方向のみに分散させ、既存の最上位を超えない
      env.mountainDepthStart - layer * env.mountainDepthStep + env.mountainDepthOffset
    );
    mountain.rotation.x = -0.03 - tLayer * 0.04;
    environmentGroup.add(mountain);
  }

  // 雲: 写実寄りのクラスタ(コア+ウィスプ)
  if(env.enableCloud){
  const cloudRealism = THREE.MathUtils.clamp(env.cloudRealism, 0.0, 1.0);
  const cloudIntraSpread = Math.max(0.1, env.cloudIntraClusterSpread);
  const cloudIntraVerticalSpread = Math.max(0.1, env.cloudIntraVerticalSpread);
  const cloudGeo = createFluffyCloudGeometry(cloudRealism, THREE.MathUtils.clamp(env.cloudFluffiness, 0.0, 1.0));
  const cloudFlatness = THREE.MathUtils.clamp(env.cloudFlatness, 0.08, 0.65);
  for(let c=0;c<env.cloudClusterCount;c++){
    const depthT = c / Math.max(1, env.cloudClusterCount - 1);
    const cloudMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0xe8e1cc).lerp(new THREE.Color(0xcfc7b2), depthT),
      roughness: 1.0,
      metalness: 0.0,
      depthWrite: false,
    });
    const cloudWispMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0xf1ebd8).lerp(new THREE.Color(0xd8d0bc), depthT),
      roughness: 1.0,
      metalness: 0.0,
      depthWrite: false,
    });
    registerEnvMat(cloudMat, env.cloudOpacity * THREE.MathUtils.lerp(0.92, 1.05, 1.0 - depthT));
    registerEnvMat(cloudWispMat, env.cloudOpacity * 0.38 * THREE.MathUtils.lerp(0.95, 1.05, 1.0 - depthT));

    const cluster = new THREE.Group();
    const clusterT = (c + 0.5) / Math.max(1, env.cloudClusterCount);
    const clusterX = THREE.MathUtils.lerp(-env.cloudSpreadX * 0.5, env.cloudSpreadX * 0.5, clusterT) + (rng() - 0.5) * 2.2;
    const clusterY = env.cloudBaseY + (rng() - 0.5) * env.cloudYSpread;
    const clusterZ = THREE.MathUtils.lerp(env.cloudDepthNear, env.cloudDepthFar, clusterT) + (rng() - 0.5) * env.cloudSpreadZ * 0.55;
    const puffCount = Math.max(3, Math.floor(env.cloudPuffsPerCluster * THREE.MathUtils.lerp(0.9, 1.45, cloudRealism)));
    const wispCount = Math.max(2, Math.floor(puffCount * 0.30));

    for(let i=0;i<puffCount;i++){
      const puff = new THREE.Mesh(cloudGeo, cloudMat);
      const ang = rng() * Math.PI * 2.0;
      const rad = Math.pow(rng(), THREE.MathUtils.lerp(1.05, 0.72, cloudRealism)) * THREE.MathUtils.lerp(0.45, 1.55, rng()) * cloudIntraSpread;
      const px = Math.cos(ang) * rad * THREE.MathUtils.lerp(1.4, 2.3, cloudRealism);
      const arch = Math.pow(Math.sin((i / Math.max(1, puffCount - 1)) * Math.PI), THREE.MathUtils.lerp(2.0, 1.35, cloudRealism));
      const py = ((rng() - 0.5) * THREE.MathUtils.lerp(0.08, 0.20, cloudRealism)
               + arch * THREE.MathUtils.lerp(0.04, 0.12, cloudRealism)) * cloudIntraVerticalSpread;
      const pz = Math.sin(ang) * rad * THREE.MathUtils.lerp(0.30, 0.55, cloudRealism);
      const s  = THREE.MathUtils.lerp(0.16, 0.56, rng());
      puff.position.set(px, py, pz);
      puff.scale.set(
        s * THREE.MathUtils.lerp(1.8, 3.8, rng()),
        s * THREE.MathUtils.lerp(cloudFlatness * 0.72, cloudFlatness * 1.35, rng()),
        s * THREE.MathUtils.lerp(0.75, 1.35, rng())
      );
      cluster.add(puff);
    }
    for(let i=0;i<wispCount;i++){
      const puff = new THREE.Mesh(cloudGeo, cloudWispMat);
      const ang = rng() * Math.PI * 2.0;
      const rad = THREE.MathUtils.lerp(1.2, 2.6, rng()) * cloudIntraSpread;
      const px = Math.cos(ang) * rad;
      const py = (rng() - 0.5) * 0.14 * cloudIntraVerticalSpread;
      const pz = Math.sin(ang) * rad * 0.42;
      const s  = THREE.MathUtils.lerp(0.10, 0.28, rng());
      puff.position.set(px, py, pz);
      puff.scale.set(
        s * THREE.MathUtils.lerp(2.0, 4.4, rng()),
        s * THREE.MathUtils.lerp(cloudFlatness * 0.45, cloudFlatness * 0.9, rng()),
        s * THREE.MathUtils.lerp(0.8, 1.45, rng())
      );
      cluster.add(puff);
    }

    cluster.position.set(clusterX, clusterY, clusterZ);
    environmentGroup.add(cluster);
    cloudDriftEntries.push({
      group: cluster,
      baseX: clusterX,
      baseZ: clusterZ,
      speed: env.cloudDriftSpeed * THREE.MathUtils.lerp(0.7, 1.35, rng()),
      amp: THREE.MathUtils.lerp(0.12, 0.40, rng()),
      phase: rng() * Math.PI * 2.0,
    });
  }
  }

  // 砂利ベース地形: 色固定面 + 影専用面（空色の影響を受けず、影だけ落とす）
  const groundMat = new THREE.MeshBasicMaterial({
    color:toColorFromRgbArray(env.gravelGroundColor ?? [0.06, 0.05, 0.04]),
    toneMapped:false,
  });
  registerEnvMat(groundMat, 0.94);
  const groundShadowOpacity = THREE.MathUtils.clamp(env.gravelGroundShadowOpacity ?? 0.42, 0, 1);
  const groundShadowMat = new THREE.ShadowMaterial({opacity: groundShadowOpacity});
  registerEnvMat(groundShadowMat, groundShadowOpacity);
  const terrainW = env.gravelFieldWidth * Math.max(0.1, env.gravelFieldWidthScale);
  const terrainD = env.gravelFieldDepth * Math.max(0.1, env.gravelFieldDepthScale);
  const terrainCenterX = fireX + 0.45;
  const terrainCenterZ = fireZ + 1.25 + terrainD * env.gravelFieldCenterZBias;
  const terrainGeo = new THREE.PlaneGeometry(terrainW, terrainD, 72, 48);
  const terrainPos = terrainGeo.attributes.position;
  for(let i=0;i<terrainPos.count;i++){
    const x = terrainPos.getX(i) / terrainW;
    const z = terrainPos.getY(i) / terrainD;
    const h1 = Math.sin((x * 8.5 + 0.37) * Math.PI * 2.0) * 0.020;
    const h2 = Math.sin((z * 11.3 + 0.81) * Math.PI * 2.0) * 0.015;
    const h3 = Math.sin(((x + z) * 5.4 + 0.12) * Math.PI * 2.0) * 0.012;
    terrainPos.setZ(i, h1 + h2 + h3);
  }
  terrainGeo.computeVertexNormals();
  const gravelGround = new THREE.Mesh(terrainGeo, groundMat);
  gravelGround.rotation.x = -Math.PI * 0.5;
  gravelGround.position.set(terrainCenterX, gravelBaseY + GRAVEL_GROUND_Y_OFFSET, terrainCenterZ);
  gravelGround.renderOrder = 0;
  gravelGround.receiveShadow = false;
  environmentGroup.add(gravelGround);
  const gravelGroundShadow = new THREE.Mesh(terrainGeo.clone(), groundShadowMat);
  gravelGroundShadow.rotation.x = -Math.PI * 0.5;
  gravelGroundShadow.position.set(terrainCenterX, gravelBaseY + GRAVEL_GROUND_Y_OFFSET + 0.001, terrainCenterZ);
  gravelGroundShadow.renderOrder = 1;
  gravelGroundShadow.receiveShadow = true;
  environmentGroup.add(gravelGroundShadow);

  // 砂利: InstancedMeshで密度を上げる（enableGravel=falseなら粒のみ非表示）
  if(env.enableGravel){
  const gravelRealism = THREE.MathUtils.clamp(env.gravelRealism, 0.0, 1.0);
  const gravelDetail = gravelRealism >= 0.67 ? 1 : 0;
  const gravelLargeGeo = new THREE.DodecahedronGeometry(1.0, gravelDetail);
  const gravelMediumGeo = new THREE.OctahedronGeometry(1.0, gravelDetail);
  const gravelSmallGeo = new THREE.IcosahedronGeometry(1.0, gravelDetail);
  const gravelLargeMat = new THREE.MeshStandardMaterial({
    color:env.gravelColorDark,
    roughness:THREE.MathUtils.clamp(env.gravelRoughness, 0.0, 1.0),
    metalness:THREE.MathUtils.clamp(env.gravelMetalness, 0.0, 1.0),
    flatShading: gravelRealism < 0.45,
  });
  const gravelMediumMat = new THREE.MeshStandardMaterial({
    color:0x1f1913,
    roughness:THREE.MathUtils.clamp(env.gravelRoughness * 0.96, 0.0, 1.0),
    metalness:THREE.MathUtils.clamp(env.gravelMetalness, 0.0, 1.0),
    flatShading: gravelRealism < 0.45,
  });
  const gravelSmallMat = new THREE.MeshStandardMaterial({
    color:env.gravelColorLight,
    roughness:THREE.MathUtils.clamp(env.gravelRoughness * 0.92, 0.0, 1.0),
    metalness:THREE.MathUtils.clamp(env.gravelMetalness, 0.0, 1.0),
    flatShading: gravelRealism < 0.45,
  });
  registerEnvMat(gravelLargeMat, env.gravelOpacity * 0.95);
  registerEnvMat(gravelMediumMat, env.gravelOpacity * 0.90);
  registerEnvMat(gravelSmallMat, env.gravelOpacity * 0.85);

  const gravelLarge = new THREE.InstancedMesh(gravelLargeGeo, gravelLargeMat, env.gravelCountLarge);
  const gravelMedium = new THREE.InstancedMesh(gravelMediumGeo, gravelMediumMat, env.gravelCountMedium);
  const gravelSmall = new THREE.InstancedMesh(gravelSmallGeo, gravelSmallMat, env.gravelCountSmall);
  gravelLarge.renderOrder = 0;
  gravelMedium.renderOrder = 0;
  gravelSmall.renderOrder = 0;
  const _m = new THREE.Matrix4();
  const _p = new THREE.Vector3();
  const _q = new THREE.Quaternion();
  const _s = new THREE.Vector3();
  const _e = new THREE.Euler();

  function sampleGravelPos(){
    // 中心周りの密度を保ちつつ、画面下部全体にも敷き詰める
    if(rng() < env.gravelCenterBias){
      const ang = rng() * Math.PI * 2.0;
      const rr  = THREE.MathUtils.lerp(env.gravelRadiusMin * 0.65, env.gravelRadiusMax * 1.10, Math.pow(rng(), 0.75));
      const warp = 0.82 + 0.36 * Math.sin(ang * 2.8 + rng() * 3.2);
      return new THREE.Vector3(
        fireX + Math.cos(ang) * rr * warp + (rng() - 0.5) * 0.20,
        gravelBaseY + (rng() - 0.5) * 0.08,
        fireZ + Math.sin(ang) * rr * warp + (rng() - 0.5) * 0.20
      );
    }
    return new THREE.Vector3(
      terrainCenterX + (rng() - 0.5) * terrainW * 0.98,
      gravelBaseY + (rng() - 0.5) * 0.07,
      terrainCenterZ + (rng() - 0.5) * terrainD * 0.96
    );
  }

  function confineToTerrain(pos, margin){
    const halfW = Math.max(0.2, terrainW * 0.5 - margin);
    const halfD = Math.max(0.2, terrainD * 0.5 - margin);
    pos.x = THREE.MathUtils.clamp(pos.x, terrainCenterX - halfW, terrainCenterX + halfW);
    pos.z = THREE.MathUtils.clamp(pos.z, terrainCenterZ - halfD, terrainCenterZ + halfD);
  }

  function scatterGravel(instanced, count, sizeMin, sizeMax){
    for(let i=0;i<count;i++){
      const pos = sampleGravelPos();
      const sc = THREE.MathUtils.lerp(sizeMin, sizeMax, rng());
      confineToTerrain(pos, sc * 1.35);
      _p.copy(pos);
      _e.set(rng() * Math.PI, rng() * Math.PI, rng() * Math.PI);
      _q.setFromEuler(_e);
      const scaleMin = THREE.MathUtils.lerp(0.58, 0.78, gravelRealism);
      const scaleMax = THREE.MathUtils.lerp(1.52, 1.30, gravelRealism);
      const scaleMinY = THREE.MathUtils.lerp(0.52, 0.72, gravelRealism);
      const scaleMaxY = THREE.MathUtils.lerp(1.38, 1.20, gravelRealism);
      _s.set(
        sc * THREE.MathUtils.lerp(scaleMin, scaleMax, rng()),
        sc * THREE.MathUtils.lerp(scaleMinY, scaleMaxY, rng()),
        sc * THREE.MathUtils.lerp(scaleMin, scaleMax, rng())
      );
      _m.compose(_p, _q, _s);
      instanced.setMatrixAt(i, _m);
    }
    instanced.instanceMatrix.needsUpdate = true;
  }
  const gravelSizeMin = Math.max(0.0001, Math.min(env.gravelSizeMin, env.gravelSizeMax));
  const gravelSizeMax = Math.max(gravelSizeMin, Math.max(env.gravelSizeMin, env.gravelSizeMax));
  const sizeBand = gravelSizeMax - gravelSizeMin;
  scatterGravel(gravelLarge, env.gravelCountLarge, gravelSizeMin + sizeBand * 0.34, gravelSizeMin + sizeBand * 1.00);
  scatterGravel(gravelMedium, env.gravelCountMedium, gravelSizeMin + sizeBand * 0.12, gravelSizeMin + sizeBand * 0.55);
  scatterGravel(gravelSmall, env.gravelCountSmall, gravelSizeMin + sizeBand * 0.00, gravelSizeMin + sizeBand * 0.28);
  environmentGroup.add(gravelLarge);
  environmentGroup.add(gravelMedium);
  environmentGroup.add(gravelSmall);
  }
}
createEnvironment();

function easeInOutCubic(t){
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}

  friendConfirmActionsEl.style.display = 'none';
  friendConfirmCardEl.classList.add('message-mode');
  friendConfirmTextEl.classList.remove('is-fading-in');
  friendConfirmTextEl.classList.add('is-fading-out');

  if(friendConfirmSwapTimer !== null) clearTimeout(friendConfirmSwapTimer);
  if(friendConfirmFadeOutTimer !== null) clearTimeout(friendConfirmFadeOutTimer);
  if(friendConfirmMsgTimer !== null) clearTimeout(friendConfirmMsgTimer);

  friendConfirmSwapTimer = setTimeout(() => {
    friendConfirmTextEl.textContent = messageText;
    friendConfirmTextEl.classList.remove('is-fading-out');
    void friendConfirmTextEl.offsetWidth;
    friendConfirmTextEl.classList.add('is-fading-in');

    friendConfirmFadeOutTimer = setTimeout(() => {
      friendConfirmTextEl.classList.remove('is-fading-in');
      friendConfirmTextEl.classList.add('is-fading-out');
    }, messageHoldMs);

    friendConfirmMsgTimer = setTimeout(() => {
      setFriendConfirmOpen(false);
    }, messageHoldMs + fadeMs);
  }, fadeMs);
}

/* ---------- レンダーループ ---------- */
const _t0 = performance.now();

function tick(){
  const now = (performance.now() - _t0) / 1000; // シェーダー用経過秒
  let labelFade = 0.0;
  let figureFade = 0.0;

  /* シェーダー時刻 */
  glowMat.uniforms.uTime.value  = now;
  flameMat.uniforms.uTime.value = now;
  emberBedMat.uniforms.uTime.value = now;

  /* 焚き火ライトのちらつき */
  fireLight.intensity =
    CONFIG.fireStyle.fireLightBase +
    Math.sin(now * 5.8) * CONFIG.fireStyle.fireLightFlickerA +
    Math.sin(now * 11.9) * CONFIG.fireStyle.fireLightFlickerB;
  const fireLevel = THREE.MathUtils.clamp(
    fireLight.intensity / Math.max(0.001, CONFIG.fireStyle.fireLightBase + CONFIG.fireStyle.fireLightFlickerA + CONFIG.fireStyle.fireLightFlickerB),
    0.55,
    1.25
  );
  const logWarmStrength = THREE.MathUtils.clamp(CONFIG.logEdgeGlow + CONFIG.fireStyle.logWarmRimIntensity * 0.8, 0.0, 1.0);
  const warmTint = new THREE.Color(1.0, 0.46, 0.12);
  for(let i=0;i<logMats.length;i++){
    const t = THREE.MathUtils.clamp((fireLevel - 0.55) / 0.70, 0, 1) * logWarmStrength;
    logMats[i].color.copy(logBaseColors[i]).lerp(warmTint, t * 0.28);
  }

  /* 薪の微細な揺れ */
  logsGroup.position.y = Math.sin(now*0.6) * 0.005;

  /* 雲の緩やかなドリフト */
  cloudDriftEntries.forEach(c => {
    c.group.position.x = c.baseX + Math.sin(now * c.speed + c.phase) * c.amp;
    c.group.position.z = c.baseZ + Math.cos(now * c.speed * 0.72 + c.phase) * c.amp * 0.45;
  });

  /* 炎パーティクルサイズ補間 (クリック後 1.5倍へ) */
  if(Math.abs(flameSizeCurrent - flameSizeTarget) > 0.05){
    flameSizeCurrent += (flameSizeTarget - flameSizeCurrent) * 0.01;
    flameMat.uniforms.uBaseSize.value = flameSizeCurrent;
  }
  if(Math.abs(particleCountCurrent - particleCountTarget) > 0.5){
    particleCountCurrent += (particleCountTarget - particleCountCurrent) * 0.14;
    flameMat.uniforms.uActiveCount.value = particleCountCurrent;
  }

  /* ── 遷移アニメーション ── */
  if(transitionStartTime !== null){
    const elapsed = (performance.now() - _t0)/1000 - transitionStartTime;
    const raw = Math.min(1.0, elapsed / CONFIG.transition.duration);
    const e   = easeInOutCubic(raw);

    /* 焚き火グループ: 位置 & スケール */
    _tFirePos.lerpVectors(FIRE_POS_INIT, FIRE_POS_FINAL, e);
    fireGroup.position.copy(_tFirePos);
    const scaleAccel = Math.max(0.01, CONFIG.transition.fireScaleAccel);
    const scaleT = Math.pow(raw, scaleAccel);
    const fireScaleNow = THREE.MathUtils.lerp(FIRE_SCALE_INIT, FIRE_SCALE_FINAL, scaleT);
    fireGroup.scale.setScalar(fireScaleNow);

    /* カメラ: 位置 & 注視点 */
    _tCamPos .lerpVectors(CAM_POS_INIT,  CAM_POS_FINAL,  e);
    _tCamLook.lerpVectors(CAM_LOOK_INIT, CAM_LOOK_FINAL, e);
    camera.position.copy(_tCamPos);
    camera.lookAt(_tCamLook);

    /* 人型オブジェクト: フェードイン (ベース + ハロー別々に opacity 制御) */
    figBaseMats.forEach(m => { m.opacity = e; });
    figHaloMats.forEach(m => { m.opacity = 0.0; }); // 発光ループ側で個別制御
    labelFade = e;
    figureFade = e;
    menuBtnEl.style.opacity = `${e}`;
    menuBtnEl.classList.toggle('menu-ready', e > 0.02);

    /* 背景環境: タップ後に遅れてフェードイン */
    const envStart = CONFIG.environment.fadeStart;
    const envDur   = Math.max(0.001, CONFIG.environment.fadeDuration);
    const envE = THREE.MathUtils.clamp((raw - envStart) / envDur, 0, 1);
    envFadeEntries.forEach(({mat, targetOpacity}) => {
      mat.opacity = targetOpacity * envE;
    });

  }
  if(CONFIG.transition.fireGroundedToTerrain){
    const fireScaleNow = fireGroup.scale.y;
    if(transitionStartTime === null){
      fireGroup.position.x = FIRE_POS_INIT.x;
      fireGroup.position.z = FIRE_POS_INIT.z;
      fireGroup.position.y =
        getGroundYBase() +
        (CONFIG.transition.fireInitialGroundOffsetY ?? 0) -
        (LOGS_MIN_Y * fireScaleNow);
    }else{
      fireGroup.position.y = getGroundYBase() + getFireGroundOffsetEffective() - (LOGS_MIN_Y * fireScaleNow);
    }
  }
  for(const fig of figures){
    fig.lookAt(
      fireGroup.position.x,
      fig.position.y + FIGURE_LOOK_Y_OFFSET,
      fireGroup.position.z
    );
  }
  const idleEnabled = !!CONFIG.figures.headIdleMotionEnabled;
  const idleSpeed = Math.max(0.01, CONFIG.figures.headIdleSpeed ?? 0.72);
  const idleYawAmp = THREE.MathUtils.degToRad(CONFIG.figures.headIdleAmpYawDeg ?? 2.4);
  const idlePitchAmp = THREE.MathUtils.degToRad(CONFIG.figures.headIdleAmpPitchDeg ?? 1.6);
  const idlePhaseSpread = CONFIG.figures.headIdlePhaseSpread ?? 1.4;
  for(let i=0;i<figures.length;i++){
    const headRig = figures[i].userData.headRig;
    if(!headRig) continue;
    if(!idleEnabled){
      headRig.rotation.set(0, 0, 0);
      continue;
    }
    const p = i * idlePhaseSpread;
    headRig.rotation.z = Math.sin(now * idleSpeed + p) * idleYawAmp;
    headRig.rotation.x = Math.sin(now * idleSpeed * 0.83 + p * 1.37) * idlePitchAmp;
  }

  const pulseDuration = Math.max(0.05, CONFIG.figures.pulseDurationSec ?? 1.0);
  const pulsePeakIntensity = Math.max(0.0, CONFIG.figures.pulsePeakIntensity ?? 1.4);
  for(let i=0;i<figures.length;i++){
    const fig = figures[i];
    const pulseMat = fig.userData.pulseBaseMat;
    if(!pulseMat) continue;
    const pulseColor = fig.userData.pulseColor instanceof THREE.Color
      ? fig.userData.pulseColor
      : new THREE.Color(1, 1, 1);
    let pulse = 0.0;
    const pulseStart = fig.userData.pulseStartTime;
    if(typeof pulseStart === 'number' && pulseStart >= 0){
      const tn = (now - pulseStart) / pulseDuration;
      if(tn >= 0.0 && tn <= 1.0){
        pulse = 1.0 - Math.abs(tn * 2.0 - 1.0); // 0s:0 -> 0.5s:1 -> 1s:0
      }else if(tn > 1.0){
        fig.userData.pulseStartTime = -1;
      }
    }
    pulseMat.emissive.copy(pulseColor);
    pulseMat.emissiveIntensity = pulsePeakIntensity * pulse * figureFade;

    const pulseHaloMat = fig.userData.pulseHaloMat;
    if(pulseHaloMat){
      const haloBase = THREE.MathUtils.clamp(CONFIG.figures.haloOpacity ?? 0.0, 0.0, 2.0);
      const haloBoost = pulsePeakIntensity * 0.33 * pulse;
      pulseHaloMat.color.copy(pulseColor);
      pulseHaloMat.opacity = figureFade * (haloBase + haloBoost);
    }
  }
  fireGroup.updateMatrixWorld(true);
  camera.updateMatrixWorld();
  camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
  volumeFire.update(now);

  const nameLift = CONFIG.figures.bodyHeight * 0.68 + CONFIG.figures.headRadius + (CONFIG.figures.nameYOffset ?? 0.52);
  const fw = frame.clientWidth;
  const fh = frame.clientHeight;
  const nameOpacity = THREE.MathUtils.clamp(labelFade, 0, 1);
  for(let i=0;i<figures.length;i++){
    const fig = figures[i];
    const tag = nameTags[i];
    if(!fig.visible){
      tag.style.opacity = '0';
      continue;
    }
    _nameWorld.set(fig.position.x, fig.position.y + nameLift, fig.position.z);
    _nameWorld.project(camera);
    const onScreen = _nameWorld.z >= -1.0 && _nameWorld.z <= 1.0;
    if(!onScreen){
      tag.style.opacity = '0';
      continue;
    }
    const sx = (_nameWorld.x * 0.5 + 0.5) * fw;
    const sy = (-_nameWorld.y * 0.5 + 0.5) * fh;
    tag.style.left = `${sx}px`;
    tag.style.top = `${sy}px`;
    tag.style.opacity = `${nameOpacity}`;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

/* ---------- タップで遷移開始 ---------- */
window.addEventListener('pointerdown', () => {
  if(transitionStartTime !== null || transitionQueued) return; // 遷移済み/予約済み
  transitionQueued = true;

  /* ① テキスト完全消去
     CSS animation (slowPulse 等) を止めてから opacity:0 にしないと
     アニメーションが style.opacity を上書きし続けてしまう */
  titleWrapEl.style.animation = 'none';
  tapEnterEl.style.animation = 'none';
  titleWrapEl.classList.add('hide');
  tapEnterEl.classList.add('hide');



  /* ③ 背景を明るく (CSS transition で焚き火色オーバーレイをフェードイン) */
  bgLightEl.style.opacity = '1';

  assignPulseColorsToFigures();
  primePulseAudio();
  startFigurePulseLoop();
  startTakibiLoopAudio();

  /* デザインルール: 0.25sec のもったり遅延後に画面遷移開始 */
  setTimeout(() => {
    figures.forEach(fig => { fig.visible = true; });
    environmentGroup.visible = true;
    transitionStartTime = (performance.now() - _t0) / 1000;
  }, 250);

  /* 炎サイズはタップ後0.3secで設定倍率へ補間開始 */
  setTimeout(() => {
    flameSizeTarget = CONFIG.fireStyle.sparkSize * CONFIG.particleTapScaleMultiplier;
    particleCountTarget = N_BASE * 2.0;
  }, 300);
});
</script>
